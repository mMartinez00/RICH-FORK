<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICH — Reach Into Cultural Heights</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="page">
    <div class="login-container">

     
      <div class="login-left">
        <div class="login-left-inner">
          <a class="logo" href="index.html">
            <img src="images/LOGO_Transparent.png" alt="RICH Logo">
          </a>

          <h1>Welcome Back</h1>
          <p class="subtitle">Sign in to continue your progress.</p>

          <form>
            <input type="email" placeholder="Email address" required />
            <input type="password" placeholder="Password" required />

            <div class="options">
              <label>
                <input type="checkbox" />
                Remember me
              </label>
              <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Sign In</button>
          </form>

          <p class="signup">
            Don’t have an account?
            <a href="contact-us.html">Contact RICH to request access</a>
          </p>
        </div>
      </div>

     
      <div class="login-right">
        <div class="login-right-inner">
          Image Can Go Here
        </div>
      </div>

    </div>
  </div>
</body>
</html>
